---
- name: Configure Docker and AWS CLI
  hosts: all  # We are applying this to the minecraft server
  become: true
  vars:
    aws_account_id: "654654281242"
    aws_region: us-east-1
    ecr_repo_name: minecraft-server
    ecr_repo_uri: "{{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repo_name }}"
    image_tag: "mc-26.4.2-v1"
    s3_bucket_name: "cs312-steffhan-minecraft-backups"

  # Below are actual steps executed by Ansible
  tasks:

    # 1.) Install Docker

    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true


    - name: Add Docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc


    - name: Add Docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list


    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true


    - name: Ensure Docker is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true


   # 2.) Install AWS CLI

    - name: Install required packages for AWS CLI
      ansible.builtin.apt:
        name:
          - curl
          - unzip
        state: present


    - name: Download AWS CLI installer
      ansible.builtin.get_url:
        url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
        dest: "/tmp/awscliv2.zip"
        force: false


    - name: Unzip AWS CLI installer
      ansible.builtin.unarchive:
        src: "/tmp/awscliv2.zip"
        dest: "/tmp"
        remote_src: yes


    - name: Run AWS CLI installer
      ansible.builtin.command: "/tmp/aws/install"
      args:
        creates: /usr/local/bin/aws


    - name: Verify AWS CLI installation
      ansible.builtin.command: "aws --version"
      register: aws_cli_version


    - name: Display AWS CLI version
      ansible.builtin.debug:
        msg: "{{ aws_cli_version.stdout }}"


    # 3.) Authenticate Docker with ECR

    - name: Authenticate Docker to ECR
      ansible.builtin.shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin \
        {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com
      no_log: true


   # 4.) Pull the Minecraft Image from ECR

    - name: Pull tagged Minecraft image from ECR
      ansible.builtin.command:
        cmd: docker pull {{ ecr_repo_uri }}:{{ image_tag }}


   # 5.) Verify if the /data directory exists
    
    - name: Ensure /data directory exists
      ansible.builtin.file:
        path: /data
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'


   # 6.) Restore S3 world data before starting Docker container 
   
    - name: Restore world data from S3
      ansible.builtin.shell: |
        aws s3 sync s3://{{ s3_bucket_name }}/backups/ /data
      when: restore_from_s3 | default(false)
      become: true


   # 7.) Write the Docker Compose file

    - name: Write Docker Compose File
      ansible.builtin.copy:
        dest: /home/ubuntu/docker-compose.yml
        content: |
          services:
            mc:
              image: "{{ ecr_repo_uri }}:{{ image_tag }}"
              restart: unless-stopped
              tty: true
              stdin_open: true
              ports:
                - "25565:25565"
              environment:
                EULA: "TRUE"
                VERSION: "1.21.4"
                MOTD: "CS 312 Ops 3 - Hana Steffen (Student ID: 934437814)"
              volumes:
                - /data:/data


   # 8.) Start the Minecraft Docker container 
   
    - name: Start the Docker Container
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate
        chdir: /home/ubuntu
      changed_when: false
